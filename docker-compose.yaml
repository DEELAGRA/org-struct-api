services:
  org-struct-api-postgres:
    image: postgres:18.1-bookworm
    container_name: org-struct-api-postgres
    environment: 
    - POSTGRES_USER=${DB_USER}
    - POSTGRES_PASSWORD=${DB_PASSWORD}
    - POSTGRES_DB=${DB_NAME}
    ports:
    - "5432:5432"
    volumes:
    - ./out/pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
  migrate:
      image: gomicro/goose:3.7.0
      container_name: orgstruct-migrate
      depends_on:
        org-struct-api-postgres:
          condition: service_healthy
      volumes:
        - ./db/migrations:/migrations
      environment:
        GOOSE_DRIVER: postgres
        GOOSE_DBSTRING: "postgres://${DB_USER}:${DB_PASSWORD}@org-struct-api-postgres:5432/${DB_NAME}?sslmode=${DB_SSLMODE}"
      command: ["goose", "-dir", "/migrations", "up"]
  app:
    build: .
    container_name: orgstruct-app
    depends_on:
      org-struct-api-postgres: 
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: ${SERVER_PORT}
      DB_HOST: org-struct-api-postgres
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}     
